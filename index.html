<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Launcher</title>

<link rel="icon" href="icons/launcher/favicon.ico">
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#04141f;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
}

/* Water */
#ocean{
  position:fixed;
  inset:0;
  z-index:0;
}

/* UI */
#ui{
  position:relative;
  z-index:2;
}

h1{
  text-align:center;
  margin:16px 0;
}

#launcher{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:24px;
  padding:32px;
}

.game{
  text-align:center;
  cursor:pointer;
}

.icon{
  width:96px;
  height:96px;
  margin:auto;
  border-radius:18px;
  background:rgba(20,30,45,.7);
  backdrop-filter:blur(6px);
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:.3s;
}

.icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.game:hover .icon{
  transform:scale(1.1);
}

.label{
  margin-top:8px;
  font-size:14px;
}

/* Embedded player */
#player{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:10;
}

#player iframe{
  width:100%;
  height:100%;
  border:0;
}

/* Xbox-style cursor */
#padCursor{
  position:fixed;
  width:28px;
  height:28px;
  border:2px solid rgba(200,240,255,.9);
  border-radius:50%;
  pointer-events:none;
  z-index:9;
  display:none;
  box-shadow:0 0 14px rgba(120,200,255,.8);
}
</style>
</head>

<body>

<canvas id="ocean"></canvas>
<div id="padCursor"></div>

<div id="ui">
  <h1>Launcher</h1>

  <div id="launcher">
    <div class="game" data-url="games/sonic4ep1/index.html" data-openblank="1" onclick="launchGame(this)">
      <div class="icon">
        <img src="https://raw.githubusercontent.com/DoggyGamesShow123/index/main/thumb/Sonic4ep1.png">
      </div>
      <div class="label">Sonic 4 EP1</div>
    </div>

    <div class="game" data-url="games/sonic%20CD/index.html" data-openblank="0" onclick="launchGame(this)">
      <div class="icon">
        <img src="https://raw.githubusercontent.com/DoggyGamesShow123/index/main/thumb/SonicCD.png">
      </div>
      <div class="label">Sonic CD</div>
    </div>
  </div>
</div>

<div id="player"></div>

<script src="js/water-gl.js"></script>
<script src="js/controller.js"></script>

<script>
const launcher=document.getElementById("launcher");
const player=document.getElementById("player");
let iframe=null;

function launchGame(el){
  const url=el.dataset.url;
  const blank=el.dataset.openblank==="1";

  if(blank){
    window.open(url,"_blank");
    return;
  }

  if(window.water) water.pause();

  launcher.style.opacity="0";
  player.style.display="block";
  iframe=document.createElement("iframe");
  iframe.src=url;
  iframe.allow="fullscreen;gamepad;autoplay";
  player.appendChild(iframe);
}

document.addEventListener("keydown",e=>{
  if(e.altKey&&(e.key==="ArrowLeft"||e.key==="ArrowRight")){
    if(!iframe)return;
    player.innerHTML="";
    player.style.display="none";
    launcher.style.opacity="1";
    iframe=null;
    if(window.water) water.resume();
  }
});
</script>

</body>
</html>
