<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Launcher</title>

<!-- ✅ Proper favicon -->
<link rel="icon" type="image/x-icon" href="icons/launcher/favicon.ico">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#04131f;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
}

#ocean{
  position:fixed;
  inset:0;
  z-index:0;
}

/* UI */
#ui{
  position:relative;
  z-index:2;
}

h1{
  text-align:center;
  margin:16px 0;
}

#launcher{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:24px;
  padding:32px;
}

.game{
  text-align:center;
  cursor:pointer;
}

.icon-wrap{
  position:relative;
  width:96px;
  margin:auto;
}

/* Icon */
.icon{
  width:96px;
  height:96px;
  border-radius:18px;
  overflow:hidden;
  background:#222;
  box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Reflection */
.reflect{
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  height:50%;
  background-repeat:no-repeat;
  background-size:100% 100%;
  transform:scaleY(-1);
  opacity:.35;
  filter:blur(2px);
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
}

.label{
  margin-top:8px;
  font-size:14px;
}

/* Embedded player */
#player{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:10;
}

#player iframe{
  width:100%;
  height:100%;
  border:0;
}

/* Xbox cursor */
#padCursor{
  position:fixed;
  width:26px;
  height:26px;
  border:2px solid rgba(200,240,255,.9);
  border-radius:50%;
  pointer-events:none;
  display:none;
  z-index:9;
  box-shadow:0 0 12px rgba(120,200,255,.9);
}
</style>
</head>

<body>

<div id="padCursor"></div>

<!-- ✅ Scripts load correctly -->
<script src="js/water-gl.js"></script>
<script src="js/controller.js"></script>

<script>
const launcher=document.getElementById("launcher");
const player=document.getElementById("player");
let iframe=null;

function launchGame(el){
  const url=el.dataset.url;
  const blank=el.dataset.openblank==="1";

  if(blank){
    window.open(url,"_blank");
    return;
  }

  if(window.water) water.pause();

  launcher.style.opacity="0";
  player.style.display="block";
  iframe=document.createElement("iframe");
  iframe.src=url;
  iframe.allow="fullscreen;gamepad;autoplay";
  player.appendChild(iframe);
}

document.addEventListener("keydown",e=>{
  if(e.altKey&&(e.key==="ArrowLeft"||e.key==="ArrowRight")){
    if(!iframe)return;
    player.innerHTML="";
    player.style.display="none";
    launcher.style.opacity="1";
    iframe=null;
    if(window.water) water.resume();
  }
});
</script>

</body>
