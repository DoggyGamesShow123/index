<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>

  <!-- ✅ Proper favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- ✅ Proper PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1d1d1d;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    #launcher {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 24px;
      padding: 32px;
    }

    .game {
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .icon {
      width: 96px;
      height: 96px;
      margin: auto;
      border-radius: 18px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.35s ease, background 0.35s ease;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game:hover .icon {
      transform: scale(1.1);
      background: #2a2a2a;
    }

    .label {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Launcher</h1>

  <div id="launcher">

    <!-- ✅ GAME: Sonic 4 EP1 -->
    <div class="game" onclick="launchGame('games/sonic4ep1/index.html')">
      <div class="icon">
        <img src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/thumb/Sonic4ep1.png" alt="Sonic 4 EP1">
      </div>
      <div class="label">Sonic 4 EP1</div>
    </div>

    <!-- ✅ GAME: Sonic CD -->
    <div class="game" onclick="launchGame('games/sonic%20CD/index.html')">
      <div class="icon">
        <img src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/thumb/SonicCD.png" alt="Sonic CD">
      </div>
      <div class="label">Sonic CD (no save)</div>
    </div>

    <!-- ✅ GAME: SRB2 Kart -->
    <div class="game" onclick="launchGame('games/SRB2KART/index.html')">
      <div class="icon">
        <img src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/icons/SRB2KART.ico" alt="SRB2 Kart">
      </div>
      <div class="label">SRB2 Kart</div>
    </div>

  </div>

  <script>
    let audio = null;

    function playSound(file) {
      if (audio) {
        audio.pause();
        audio = null;
      }
      audio = new Audio(file);
      audio.volume = 0.6;
      audio.play();
      audio.onended = () => audio = null;
    }

    /* ✅ about:blank launcher with NO size limits */
    function launchGame(url) {
      playSound("sounds/open.mp3");

      const win = window.open("about:blank", "_blank");
      if (!win) return;

        <html>

            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Game</title>
          </head>
