<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Launcher</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #0e0e0e;
  --card: #1b1b1b;
}

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#launcher {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 24px;
  padding: 32px;
  transition: opacity 0.4s ease;
}

.game {
  text-align: center;
  cursor: pointer;
}

.icon {
  width: 96px;
  height: 96px;
  margin: auto;
  border-radius: 18px;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.4s ease;
}

.icon img {
  max-width: 64px;
  max-height: 64px;
}

.game:hover .icon {
  transform: scale(1.1);
}

.label {
  margin-top: 8px;
  font-size: 14px;
}

#player {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  z-index: 10;
}

#player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.zoom-in {
  animation: zoomIn 0.45s ease forwards;
}

.zoom-out {
  animation: zoomOut 0.45s ease forwards;
}

@keyframes zoomIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes zoomOut {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(0.85); opacity: 0; }
}
</style>
</head>
<body>

<div id="launcher">

  <!-- GAME ICON -->
  <div class="game" onclick="launchGame('srb2.html')">
    <div class="icon">
      <img src="icons/srb2.ico" alt="SRB2">
    </div>
    <div class="label">SRB2</div>
  </div>

</div>

<div id="player"></div>

<script>
let player = document.getElementById("player");
let launcher = document.getElementById("launcher");
let currentIframe = null;
let audio = null;

/* SMART AUDIO: create → play → destroy */
function playSound(file) {
  if (audio) {
    audio.pause();
    audio = null;
  }
  audio = new Audio(file);
  audio.volume = 0.6;
  audio.play();
  audio.onended = () => {
    audio = null; // free memory
  };
}

function launchGame(url) {
  playSound("sounds/open.mp3");

  // unload launcher images to save memory
  document.querySelectorAll("#launcher img").forEach(img => img.remove());

  launcher.style.opacity = "0";

  player.style.display = "block";
  player.className = "zoom-in";

  currentIframe = document.createElement("iframe");
  currentIframe.src = url;
  currentIframe.allow = "fullscreen; gamepad; autoplay";
  player.appendChild(currentIframe);
}

function closeGame() {
  if (!currentIframe) return;

  playSound("sounds/close.mp3");

  player.className = "zoom-out";

  setTimeout(() => {
    player.innerHTML = "";
    player.style.display = "none";
    launcher.style.opacity = "1";

    // reload launcher cleanly (restores icons + frees iframe memory)
    location.reload();
  }, 450);
}

/* ALT + LEFT or RIGHT closes game */
document.addEventListener("keydown", e => {
  if (e.altKey && (e.key === "ArrowLeft" || e.key === "ArrowRight")) {
    closeGame();
  }
});
</script>

</body>
</html>
