<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>

  <!-- Site favicon -->
  <link rel="icon" type="image/x-icon"
        href="https://github.com/DoggyGamesShow123/index/blob/main/icons/Saturn.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Grid layout */
    .launcher {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: auto;
    }

    /* Button */
    .app {
      text-align: center;
      text-decoration: none;
      color: white;
    }

    .icon-box {
      width: 96px;
      height: 96px;
      margin: auto;
      background: #222;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .icon-box:hover {
      transform: scale(1.08);
      background: #333;
    }

    .icon-box img {
      max-width: 64px;
      max-height: 64px;
      image-rendering: auto;
    }

    .label {
      margin-top: 8px;
      font-size: 14px;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

  <h1>Launcher</h1>

  <div class="launcher">

    <!-- App button -->
    <a class="app" href="srb2.html">
      <div class="icon-box">
        <img src="icons/SRB2KART.ico" alt="SRB2">
      </div>
      <div class="label">SRB2</div>
    </a>

    <!-- Another app -->
    <a class="app" href="saturn.html">
      <div class="icon-box">
        <img src="icons/saturn.ico" alt="Saturn">
      </div>
      <div class="label">Sega Saturn</div>
    </a>

  </div>

</body>
</html>
``
