<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>

  <link rel="icon" type="image/x-icon" href="icons/launcher/favicon.ico">
  <link rel="manifest" href="manifest.json">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root { --bg:#0f0f0f; --card:#1d1d1d; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    h1 { text-align: center; margin: 20px 0; }

    #launcher {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 24px;
      padding: 32px;
      transition: opacity 0.4s ease;
    }

    .game { text-align: center; cursor: pointer; user-select: none; }

    .icon {
      width: 96px;
      height: 96px;
      margin: auto;
      border-radius: 18px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.35s ease, background 0.35s ease;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game:hover .icon {
      transform: scale(1.1);
      background: #2a2a2a;
    }

    .label { margin-top: 8px; font-size: 14px; }

    /* Embedded player overlay (only used when data-openblank="0") */
    #player {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      z-index: 10;
    }

    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .zoom-in  { animation: zoomIn 0.45s ease forwards; }
    .zoom-out { animation: zoomOut 0.45s ease forwards; }

    @keyframes zoomIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes zoomOut {
      from { transform: scale(1); opacity: 1; }
      to   { transform: scale(0.85); opacity: 0; }
    }
  </style>
</head>

<body>
  <h1>Launcher</h1>

  <div id="launcher">

    <!-- GAME: Sonic 4 EP1 (open in about:blank tab) -->
    <div class="game"
         data-url="games/sonic4ep1/index.html"
         data-openblank="1"
         onclick="launchGame(this)">
      <div class="icon">
        <img
          src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/thumb/Sonic4ep1.png"
          alt="Sonic 4 Episode I">
      </div>
      <div class="label">Sonic 4 EP1</div>
    </div>

    <!-- GAME: Sonic CD (embedded) -->
    <div class="game"
         data-url="games/sonic%20CD/index.html"
         data-openblank="0"
         onclick="launchGame(this)">
      <div class="icon">
        <img
          src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/thumb/SonicCD.png"
          alt="Sonic CD">
      </div>
      <div class="label">Sonic Cd (no save)</div>
    </div>

    <!-- GAME: SRB2 Kart (embedded) -->
    <div class="game"
         data-url="games/SRB2KART/index.html"
         data-openblank="0"
         onclick="launchGame(this)">
      <div class="icon">
        <img
          src="https://raw.githubusercontent.com/DoggyGamesShow123/index/refs/heads/main/icons/SRB2KART.ico"
          alt="SRB2 Kart">
      </div>
      <div class="label">SRB2 Kart</div>
    </div>

  </div>

  <div id="player"></div>

  <script>
    var launcher = document.getElementById("launcher");
    var player = document.getElementById("player");
    var currentIframe = null;
    var audio = null;

    function playSound(file) {
      try {
        if (audio) { audio.pause(); audio = null; }
        audio = new Audio(file);
        audio.volume = 0.6;
        audio.play().catch(function(){});
        audio.onended = function(){ audio = null; };
      } catch (e) {}
    }

    function absoluteUrl(url) {
      try { return new URL(url, window.location.href).href; }
      catch (e) { return url; }
    }

    // ✅ about:blank tab that STAYS about:blank (game is embedded fullscreen)
    function openAboutBlankEmbedded(url) {
      var win = window.open("about:blank", "_blank");
      if (!win) {
        // popup blocked fallback: just open normally
        window.open(url, "_blank");
        return;
      }

      var abs = absoluteUrl(url);

      // Open window FIRST (popup-safe), THEN sound
      playSound("sounds/open.mp3");

      win.document.open();
      win.document.write(
        '<!DOCTYPE html>' +
        '<html><head>' +
        '<meta charset="utf-8">' +
        '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
        '<title>Game</title>' +
        '<link rel="icon" type="image/x-icon" href="' + absoluteUrl("icons/launcher/favicon.ico") + '">' +
        '</head><body>' +
        '<iframe id="g" src="' + abs.replace(/"/g, '&quot;') + '" allow="fullscreen; gamepad; autoplay" allowfullscreen></iframe>' +
        '<script>' +
          // No external CSS file, but we must size the iframe.
          // This makes it truly full window, no limits.
          'var f=document.getElementById("g");' +
          'document.documentElement.style.margin="0";' +
          'document.body.style.margin="0";' +
          'document.body.style.overflow="hidden";' +
          'f.style.position="fixed";f.style.left="0";f.style.top="0";' +
          'f.style.width="100vw";f.style.height="100vh";f.style.border="0";' +
        '<\/script>' +
        '</body></html>'
      );
      win.document.close();
    }

    function launchEmbedded(url) {
      playSound("sounds/open.mp3");

      // memory saving: remove launcher images behind the embed
      var imgs = document.querySelectorAll("#launcher img");
      for (var i = 0; i < imgs.length; i++) imgs[i].remove();

      launcher.style.opacity = "0";

      player.style.display = "block";
      player.className = "zoom-in";

      currentIframe = document.createElement("iframe");
      currentIframe.src = url;
      currentIframe.setAttribute("allow", "fullscreen; gamepad; autoplay");
      currentIframe.setAttribute("allowfullscreen", "");
      player.appendChild(currentIframe);
    }

    function launchGame(el) {
      var url = el.getAttribute("data-url");
      var openBlank = el.getAttribute("data-openblank") === "1";

      if (openBlank) {
        // about:blank embed mode
        openAboutBlankEmbedded(url);
      } else {
        // original embedded mode
        launchEmbedded(url);
      }
    }

    function closeGame() {
      if (!currentIframe) return;

      playSound("sounds/close.mp3");
      player.className = "zoom-out";

      setTimeout(function () {
        player.innerHTML = "";
        player.style.display = "none";
        launcher.style.opacity = "1";
        location.reload();
      }, 450);
    }

    // ALT + LEFT or RIGHT closes embedded game only
    document.addEventListener("keydown", function (e) {
      if (e.altKey && (e.key === "ArrowLeft" || e.key === "ArrowRight")) {
        closeGame();
      }
    });
  </script>
</body>
</html>
